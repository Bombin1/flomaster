<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLOMASTER | Print Studio</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">  

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            height: 100vh;
            width: 100vw;
            color: white;
            overflow: hidden;
            position: fixed;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #viewport {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            perspective-origin: 50% 50%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        #tunnel {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform, opacity, filter;
            backface-visibility: hidden;
            transition: none !important; 
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .logo img {
            width: 260px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.2));
            margin-bottom: 10px;
        }

        .tagline {
            margin-bottom: 30px;
            font-family: "Pacifico", cursive;
            font-size: 18px;
            color: #fff;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .button {
            padding: 14px 20px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: block;
            transition: background 0.3s;
        }

        .button:active {
            background: rgba(255,255,255,0.3);
        }

        .svg-content {
            width: auto;
            height: auto;
            max-width: 90vw;
            max-height: 80vh;
            object-fit: contain;
        }
    </style>
</head>

<body>

<div id="viewport">
    <div id="tunnel">
        <div class="layer" id="layer-0">
            <div class="container">
                <div class="logo">
                    <img src="flomaster.svg" alt="FLOMASTER Logo">
                </div>
                <div class="tagline">Від ідеї до принта.</div>
                <div class="buttons">
                    <a class="button" href="https://dtf.org.ua/">ВЕБ-САЙТ</a>
                    <a class="button" href="https://www.instagram.com/flomaster_dtf/">INSTAGRAM</a>
                    <a class="button" href="https://t.me/Flomasterstudio">TELEGRAM</a>
                    <a class="button" href="viber://chat?number=%2B380983583133">VIBER</a>
                    <a class="button" href="contact.vcf">ЗБЕРЕГТИ КОНТАКТ</a>
                </div>
            </div>
        </div>

        <div class="layer" id="layer-1"><img src="1.svg" class="svg-content"></div>
        <div class="layer" id="layer-2"><img src="2.svg" class="svg-content"></div>
        <div class="layer" id="layer-3"><img src="3.svg" class="svg-content"></div>
        <div class="layer" id="layer-4"><img src="4.svg" class="svg-content"></div>
    </div>
</div>

<script>
    const layers = document.querySelectorAll('.layer');
    const totalLayers = layers.length;
    
    const zSpacing = -1400; 
    const loopDistance = totalLayers * Math.abs(zSpacing);
    
    let targetZ = 0;
    let currentZ = 0;
    const lerpFactor = 0.07; 

    function render() {
        // Плавний рух
        currentZ += (targetZ - currentZ) * lerpFactor;
        const loopOffset = (currentZ % loopDistance + loopDistance) % loopDistance;

        layers.forEach((layer, index) => {
            let layerZ = index * zSpacing;
            let relZ = layerZ + loopOffset;

            // Логіка нескінченності (стрибок у темряві)
            if (relZ > 1000) relZ -= loopDistance;
            else if (relZ < (zSpacing * (totalLayers - 0.5))) relZ += loopDistance;

            let opacity = 0;
            let scale = 1;

            if (relZ > 0) {
                // ВИЛІТ НА ГЛЯДАЧА
                const factor = relZ / 800; 
                opacity = 1 - factor; 
                scale = 1 + factor * 3;
            } else {
                // ПОЯВА З ГЛИБИНИ
                const factor = 1 - (relZ / -1200);
                opacity = factor;
                scale = 1 + (relZ / 5000);
            }

            // ОПТИМІЗАЦІЯ ДЛЯ GOOGLE PIXEL
            if (opacity <= 0.01) {
                layer.style.visibility = 'hidden';
            } else {
                layer.style.visibility = 'visible';
                layer.style.opacity = Math.max(0, Math.min(1, opacity));
                layer.style.transform = `translate3d(0, 0, ${relZ}px) scale(${Math.max(0, scale)})`;
            }

            // Кліки (тільки для Тітулки)
            if (index === 0) {
                const isClickable = relZ > -400 && relZ < 250;
                layer.style.pointerEvents = isClickable ? 'all' : 'none';
            } else {
                layer.style.pointerEvents = 'none';
            }
        });

        requestAnimationFrame(render);
    }

    // ЛЕГКІ ПОДІЇ СКРОЛУ
    window.addEventListener('wheel', (e) => {
        let delta = e.deltaY;
        
        // Спрощений "магніт" (опір біля центру)
        const currentPos = (currentZ % loopDistance + loopDistance) % loopDistance;
        layers.forEach((_, i) => {
            let z = (i * zSpacing + currentPos) % loopDistance;
            if (Math.abs(z) < 150) delta *= 0.5; 
        });

        targetZ += delta * 1.2;
    }, { passive: true });

    let lastY = 0;
    window.addEventListener('touchstart', (e) => {
        lastY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
        let deltaY = lastY - e.touches[0].clientY;
        
        // Опір для тач-скрину
        const currentPos = (currentZ % loopDistance + loopDistance) % loopDistance;
        if (Math.abs(currentPos % Math.abs(zSpacing)) < 150) deltaY *= 0.6;

        targetZ += deltaY * 3.5;
        lastY = e.touches[0].clientY;
    }, { passive: true });

    requestAnimationFrame(render);
</script>

</body>
</html>
