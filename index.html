<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">  

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at 50% 30%, #111 0%, #000 60%);
  animation: bgPulse 8s ease-in-out infinite alternate;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  color: white;
}

@keyframes bgPulse {
  0% { background-position: 0% 0%; }
  50% { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}

.container {
  text-align: center;
  opacity: 0;
  animation: fadeInContainer 1.5s ease forwards;
}

@keyframes fadeInContainer {
  to { opacity: 1; }
}

/* Логотип */
.logo img {
  width: 300px; /* або свій розмір */
  height: auto;
  opacity: 0;
  transform: scale(0.7);
  animation: logoAppear 1.5s ease forwards;
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
}

@keyframes logoAppear {
  to {
    opacity: 1;
    transform: scale(1);
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.6));
  }
}
/* Tagline */
/* Залишаємо анімацію з .tagline */
.tagline {
  font-weight: 300;               
  font-size: 16px;                
  opacity: 0;                      
  margin-bottom: 40px;            
  animation: taglineAppear 1.5s 1.2s ease forwards; 
  font-family: inherit; /* важливо, щоб не перекривати Pacifico */
}

/* Клас для шрифту Pacifico тільки на цю надпис */
.pacifico-tagline {
  font-family: "Pacifico", cursive;
  font-weight: normal;
  font-size: 22px; /* регулюй під свій дизайн */
}

@keyframes taglineAppear {
  to {
    opacity: 0.8;
    transform: translateY(0);
  }
}

/* Кнопки */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.button {
  padding: 12px 28px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  color: white;
  text-decoration: none;
  font-size: 14px;
  transition: all 0.4s ease;
  opacity: 0;
  animation: buttonAppear 1s 1.8s ease forwards;
}

@keyframes buttonAppear {
  to { opacity: 1; }
}

.button:hover {
  background: rgba(255,255,255,0.8);
  color: black;
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 15px rgba(255,255,255,0.3);
}

/* Лічильник */
.counter {
  position: absolute;
  bottom: 20px;
  font-size: 12px;
  opacity: 0.4;
}

</style>
</head>

<body>

<div class="container">
  <div class="logo">
  <img src="flomaster.svg" alt="FLOMASTER Logo">
</div>
  <div class="tagline pacifico-tagline">
  Від ідеї до принта.
  </div>

  <div class="buttons">
    <a class="button" href="https://dtf.org.ua/">Сайт</a>
    <a class="button" href="https://www.instagram.com/flomaster_dtf?igsh=NWpnYjdzd292Y3du">Instagram</a>
    <a class="button" href="https://t.me/Flomasterstudio">Telegram</a>
    <a class="button" href="viber://chat?number=%2B380983583133">Viber</a>
    <a class="button" href="contact.vcf">Зберегти контакт</a>
  </div>
</div>

</body>
</html>
