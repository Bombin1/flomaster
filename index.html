<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLOMASTER | Digital Print Studio</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">  

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            height: 100vh;
            width: 100vw;
            color: white;
            overflow: hidden;
            position: fixed;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #viewport {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 800px; /* Трохи менше значення для гострішої перспективи */
            perspective-origin: 50% 50%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        #tunnel {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform, opacity, filter;
            backface-visibility: hidden;
            transition: none !important; 
        }

        /* Контейнер титульної */
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .logo img {
            width: 280px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.2));
            margin-bottom: 10px;
        }

        .tagline {
            margin-bottom: 35px;
            font-family: "Pacifico", cursive;
            font-size: 20px;
            color: #fff;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .button {
            padding: 14px 20px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: block;
        }

        .svg-content {
            width: auto;
            height: auto;
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
        }

    </style>
</head>

<body>

<div id="viewport">
    <div id="tunnel">
        <div class="layer" id="layer-0">
            <div class="container">
                <div class="logo">
                    <img src="flomaster.svg" alt="FLOMASTER Logo">
                </div>
                <div class="tagline">Від ідеї до принта.</div>
                <div class="buttons">
                    <a class="button" href="https://dtf.org.ua/">ВЕБ-САЙТ</a>
                    <a class="button" href="https://www.instagram.com/flomaster_dtf/">INSTAGRAM</a>
                    <a class="button" href="https://t.me/Flomasterstudio">TELEGRAM</a>
                    <a class="button" href="viber://chat?number=%2B380983583133">VIBER</a>
                    <a class="button" href="contact.vcf">ЗБЕРЕГТИ КОНТАКТ</a>
                </div>
            </div>
        </div>

        <div class="layer" id="layer-1"><img src="1.svg" class="svg-content" alt="Work 1"></div>
        <div class="layer" id="layer-2"><img src="2.svg" class="svg-content" alt="Work 2"></div>
        <div class="layer" id="layer-3"><img src="3.svg" class="svg-content" alt="Work 3"></div>
        <div class="layer" id="layer-4"><img src="4.svg" class="svg-content" alt="Work 4"></div>
    </div>
</div>

<script>
    const layers = document.querySelectorAll('.layer');
    const totalLayers = layers.length;
    
    // Параметри тунелю
    const zSpacing = -1200; // Збільшив відстань, щоб вони менше перетиналися
    const loopDistance = totalLayers * Math.abs(zSpacing);
    let zOffset = 0;
    
    // Плавність (інерція)
    let targetZOffset = 0;
    let currentZOffset = 0;

    function render() {
        // Плавне слідування за метою (easing)
        currentZOffset += (targetZOffset - currentZOffset) * 0.1;

        const loopOffset = (currentZOffset % loopDistance + loopDistance) % loopDistance;

        layers.forEach((layer, index) => {
            let layerZ = index * zSpacing;
            let relativeZ = layerZ + loopOffset;

            // Зациклення
            if (relativeZ > 600) relativeZ -= loopDistance;
            else if (relativeZ < (zSpacing * (totalLayers - 0.5))) relativeZ += loopDistance;

            let opacity = 0;
            let scale = 1;
            let brightness = 1;

            // --- НОВА ЛОГІКА ВИДИМОСТІ ---
            if (relativeZ > 0) {
                // Вилітає на глядача
                opacity = 1 - (relativeZ / 600);
                scale = 1 + (relativeZ / 300);
                brightness = 1;
            } else if (relativeZ > -1000) {
                // Поступово з'являється з темряви
                // Картинка стає повністю видимою тільки коли підлітає ближче ніж -1000px
                opacity = 1 - (Math.abs(relativeZ) / 1000);
                brightness = 1 - (Math.abs(relativeZ) / 1000);
                scale = 1;
            } else {
                // Все що далі - повністю приховано
                opacity = 0;
            }

            layer.style.transform = `translate3d(0, 0, ${relativeZ}px) scale(${scale})`;
            layer.style.opacity = opacity;
            layer.style.filter = `brightness(${brightness})`;

            // Керування кнопками титулки
            if (index === 0) {
                const isFocused = relativeZ > -100 && relativeZ < 100;
                layer.style.pointerEvents = isFocused ? 'all' : 'none';
                layer.style.visibility = relativeZ > 500 || relativeZ < -800 ? 'hidden' : 'visible';
            }
        });

        requestAnimationFrame(render);
    }

    // Керування (з інерцією для плавності)
    window.addEventListener('wheel', (e) => {
        targetZOffset += e.deltaY * 1.5;
        if (e.cancelable) e.preventDefault();
    }, { passive: false });

    let touchStartY = 0;
    window.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
    });

    window.addEventListener('touchmove', (e) => {
        const touchY = e.touches[0].clientY;
        const deltaY = touchStartY - touchY;
        targetZOffset += deltaY * 4; // Чутливість Poco
        touchStartY = touchY;
        if (e.cancelable) e.preventDefault();
    }, { passive: false });

    requestAnimationFrame(render);
</script>

</body>
</html>
