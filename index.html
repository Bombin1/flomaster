<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLOMASTER | Digital Print Studio</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">  

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            height: 100vh;
            width: 100vw;
            color: white;
            overflow: hidden;
            position: fixed;
            touch-action: none; /* Вимикаємо стандартний скрол браузера */
            user-select: none;
            -webkit-user-select: none;
        }

        /* Головна сцена з перспективою */
        #viewport {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1000px; /* Глибина 3D простору */
            perspective-origin: 50% 50%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Контейнер, який ми будемо рухати */
        #tunnel {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d; /* Важливо для 3D */
            will-change: transform;
        }

        /* Загальний стиль для кожного шару (слайда) */
        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform, opacity;
            backface-visibility: hidden; /* Оптимізація */
            /* Вимикаємо CSS transitions, рух тільки через JS */
            transition: none !important; 
        }

        /* Тітульна сторінка */
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .logo img {
            width: 280px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.2));
            margin-bottom: 10px;
        }

        .tagline {
            margin-bottom: 35px;
            font-family: "Pacifico", cursive;
            font-size: 20px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .button {
            padding: 14px 20px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            display: block;
        }

        /* Відключаємо hover на мобільних, щоб не "липнув" */
        @media (hover: hover) {
            .button:hover {
                background: rgba(255,255,255,0.1);
                border-color: rgba(255,255,255,0.5);
            }
        }

        .button:active {
            background: rgba(255,255,255,0.2);
            transform: scale(0.98);
        }

        /* Стиль для SVG зображень */
        .svg-content {
            width: auto;
            height: auto;
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }

    </style>
</head>

<body>

<div id="viewport">
    <div id="tunnel">
        <div class="layer" id="layer-0">
            <div class="container">
                <div class="logo">
                    <img src="flomaster.svg" alt="FLOMASTER Logo">
                </div>
                <div class="tagline">Від ідеї до принта.</div>
                <div class="buttons">
                    <a class="button" href="https://dtf.org.ua/">ВЕБ-САЙТ</a>
                    <a class="button" href="https://www.instagram.com/flomaster_dtf/">INSTAGRAM</a>
                    <a class="button" href="https://t.me/Flomasterstudio">TELEGRAM</a>
                    <a class="button" href="viber://chat?number=%2B380983583133">VIBER</a>
                    <a class="button" href="contact.vcf">ЗБЕРЕГТИ КОНТАКТ</a>
                </div>
            </div>
        </div>

        <div class="layer" id="layer-1"><img src="1.svg" class="svg-content" alt="Work 1"></div>
        <div class="layer" id="layer-2"><img src="2.svg" class="svg-content" alt="Work 2"></div>
        <div class="layer" id="layer-3"><img src="3.svg" class="svg-content" alt="Work 3"></div>
        <div class="layer" id="layer-4"><img src="4.svg" class="svg-content" alt="Work 4"></div>
        <div class="layer" id="layer-5"><img src="5.svg" class="svg-content" alt="Work 5"></div>
    </div>
</div>

<script>
    const tunnel = document.getElementById('tunnel');
    const layers = document.querySelectorAll('.layer');
    const totalLayers = layers.length;
    
    // НАЛАШТУВАННЯ ТУНЕЛЮ (в пікселях по осі Z)
    const baseZSpacing = -1000; // Відстань між зображеннями вглиб
    const loopDistance = totalLayers * Math.abs(baseZSpacing); // Довжина всього циклу
    
    // Поточне положення "камери" (віртуальний скрол)
    let zOffset = 0;
    
    // Змінні для обробки свайпів
    let touchStartY = 0;
    let isTouching = false;

    // --- ГОЛОВНА ФУНКЦІЯ РЕНДЕРУ (працює в реальному часі) ---
    function render() {
        // Приводимо zOffset до діапазону циклу, щоб створити нескінченність
        const currentLoopOffset = (zOffset % loopDistance + loopDistance) % loopDistance;

        layers.forEach((layer, index) => {
            // Базове положення цього шару в тунелі
            let layerZ = index * baseZSpacing;
            
            // Рахуємо положення шару відносно "камери"
            let relativeZ = layerZ + currentLoopOffset;

            // --- ЛОГІКА ЗАСІЦЛЕННЯ ОКРЕМОГО ШАРУ ---
            // Якщо шар пролетів "за спину" (relativeZ > 500), 
            // переставляємо його в самий кінець тунелю.
            if (relativeZ > 500) {
                relativeZ -= loopDistance;
            } 
            // Якщо ми скролимо назад і шар занадто глибоко, переставляємо на початок
            else if (relativeZ < (baseZSpacing * (totalLayers - 0.5))) {
                relativeZ += loopDistance;
            }

            // --- ЕФЕКТ UNKLE (проліт повз камеру) ---
            let opacity = 1;
            let scale = 1;

            if (relativeZ > 0) {
                // Коли об'єкт наближається до камери (0px) і пролітає далі (до 500px):
                // 1. Плавно зникає (opacity 1 -> 0)
                opacity = 1 - (relativeZ / 500); 
                // 2. Швидко збільшується (scale 1 -> 3), як на UNKLE
                scale = 1 + (relativeZ / 250); 
            } else {
                // Коли об'єкт у глибині: opacity 1, scale 1
                opacity = 1;
                scale = 1;
            }

            // Застосовуємо трансформації. Використовуємо translate3d для GPU прискорення
            layer.style.transform = `translate3d(0, 0, ${relativeZ}px) scale(${scale})`;
            layer.style.opacity = opacity;

            // Керування клікабельністю кнопок: тільки якщо шар прямо перед очима
            if (index === 0) { // Для Тітульної
                layer.style.pointerEvents = (relativeZ > -200 && relativeZ < 200) ? 'all' : 'none';
            }
        });

        // Запускаємо наступний кадр анімації
        requestAnimationFrame(render);
    }

    // --- ОБРОБНИКИ ПОДІЙ (керування zOffset) ---

    // 1. Миша (коліщатко)
    window.addEventListener('wheel', (e) => {
        // Чутливість миші (можна підправити)
        zOffset += e.deltaY * 2; 
        if (e.cancelable) e.preventDefault();
    }, { passive: false });

    // 2. Смартфон (свайп)
    window.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
        isTouching = true;
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
        if (!isTouching) return;
        const touchCurrentY = e.touches[0].clientY;
        
        // Різниця руху пальця
        const deltaY = touchStartY - touchCurrentY;
        
        // Додаємо різницю до zOffset. *3 - це чутливість свайпу на Poco
        zOffset += deltaY * 3; 

        // Оновлюємо початкову точку для наступного кадру руху
        touchStartY = touchCurrentY;

        if (e.cancelable) e.preventDefault();
    }, { passive: false });

    window.addEventListener('touchend', () => {
        isTouching = false;
    });

    // --- ЗАПУСК ---
    // Ініціалізуємо render loop
    requestAnimationFrame(render);

</script>

<script data-goatcounter="https://flomaster.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

</body>
</html>
