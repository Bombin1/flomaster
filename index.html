<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLOMASTER | Digital Print Studio</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">  

    <style>
        /* Базові налаштування */
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            height: 100vh;
            width: 100vw;
            color: white;
            overflow: hidden;
            position: fixed;
            touch-action: none;
            overscroll-behavior: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Контейнер для сцени */
        #scene-container {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1200px; /* Глибина тунелю */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Загальний стиль для кожного шару (слайда) */
        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            /* Плавність переходу як на UNKLE */
            transition: 
                transform 1.2s cubic-bezier(0.22, 1, 0.36, 1), 
                opacity 1s ease,
                filter 1.2s ease;
            pointer-events: none;
            will-change: transform, opacity;
            z-index: 1;
        }

        /* Стан: Об'єкт у глибині (чекає своєї черги) */
        .layer.incoming {
            opacity: 0;
            visibility: visible;
            transform: translateZ(-1500px) scale(0.1);
            filter: blur(10px);
        }

        /* Стан: Об'єкт прямо перед очима (активний) */
        .layer.active {
            opacity: 1;
            visibility: visible;
            transform: translateZ(0px) scale(1);
            filter: blur(0px);
            pointer-events: all;
            z-index: 10;
        }

        /* Стан: Об'єкт пролетів "крізь" глядача */
        .layer.exit {
            opacity: 0;
            visibility: visible;
            transform: translateZ(1000px) scale(3);
            filter: blur(15px);
        }

        /* Твоя Титульна сторінка */
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .logo img {
            width: 280px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.2));
            margin-bottom: 10px;
        }

        .tagline {
            margin-bottom: 35px;
            font-family: "Pacifico", cursive;
            font-size: 20px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .button {
            padding: 14px 20px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .button:active {
            background: rgba(255,255,255,0.2);
            transform: scale(0.98);
        }

        /* Стиль для SVG зображень */
        .svg-content {
            width: auto;
            height: auto;
            max-width: 85vw;
            max-height: 80vh;
            object-fit: contain;
            /* Ефект легкого світіння для SVG */
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }

    </style>
</head>

<body>

<div id="scene-container">
    <div class="layer active" id="layer-0">
        <div class="container">
            <div class="logo">
                <img src="flomaster.svg" alt="FLOMASTER Logo">
            </div>
            <div class="tagline">Від ідеї до принта.</div>
            <div class="buttons">
                <a class="button" href="https://dtf.org.ua/">ВЕБ-САЙТ</a>
                <a class="button" href="https://www.instagram.com/flomaster_dtf/">INSTAGRAM</a>
                <a class="button" href="https://t.me/Flomasterstudio">TELEGRAM</a>
                <a class="button" href="viber://chat?number=%2B380983583133">VIBER</a>
                <a class="button" href="contact.vcf">ЗБЕРЕГТИ КОНТАКТ</a>
            </div>
        </div>
    </div>

    <div class="layer incoming" id="layer-1"><img src="1.svg" class="svg-content" alt="Work 1"></div>
    <div class="layer" id="layer-2"><img src="2.svg" class="svg-content" alt="Work 2"></div>
    <div class="layer" id="layer-3"><img src="3.svg" class="svg-content" alt="Work 3"></div>
    <div class="layer" id="layer-4"><img src="4.svg" class="svg-content" alt="Work 4"></div>
    <div class="layer" id="layer-5"><img src="5.svg" class="svg-content" alt="Work 5"></div>
</div>

<script>
    let currentLayer = 0;
    const layers = document.querySelectorAll('.layer');
    const totalLayers = layers.length;
    let isAnimating = false;

    function updateLayers(direction) {
        if (isAnimating) return;
        isAnimating = true;

        const prevLayer = currentLayer;

        if (direction === 'down') {
            currentLayer = (currentLayer + 1) % totalLayers;
        } else {
            currentLayer = (currentLayer - 1 + totalLayers) % totalLayers;
        }

        // Логіка перемикання класів для 3D польоту
        layers.forEach((layer, index) => {
            layer.classList.remove('active', 'exit', 'incoming');
            
            if (index === currentLayer) {
                layer.classList.add('active');
            } else if (index === prevLayer) {
                // Якщо йдемо вниз — старий слайд вилітає на нас, якщо вгору — у глибину
                layer.classList.add(direction === 'down' ? 'exit' : 'incoming');
            } else {
                // Всі інші ховаються в глибині (або чекають зверху)
                if (direction === 'down') {
                     layer.classList.add('incoming');
                } else {
                     layer.classList.add('exit');
                }
            }
        });

        // Блокуємо повторне натискання на час анімації
        setTimeout(() => {
            isAnimating = false;
        }, 1000); 
    }

    // Блокування системного скролу
    window.addEventListener('touchmove', (e) => {
        if (e.cancelable) e.preventDefault();
    }, { passive: false });

    // Обробка миші
    window.addEventListener('wheel', (e) => {
        if (isAnimating) return;
        if (Math.abs(e.deltaY) > 20) {
            updateLayers(e.deltaY > 0 ? 'down' : 'up');
        }
    }, { passive: false });

    // Обробка свайпів (Чутливість під Poco)
    let touchStartY = 0;
    window.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
    }, { passive: false });

    window.addEventListener('touchend', (e) => {
        let touchEndY = e.changedTouches[0].clientY;
        let distance = touchStartY - touchEndY;

        if (Math.abs(distance) > 50) {
            updateLayers(distance > 0 ? 'down' : 'up');
        }
    }, { passive: false });

    // Ініціалізація: готуємо наступний шар у черзі
    layers[(currentLayer + 1) % totalLayers].classList.add('incoming');
</script>

<script data-goatcounter="https://flomaster.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

</body>
</html>
